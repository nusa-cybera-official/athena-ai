<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Login — Athena AI</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;800&display=swap">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#1a0533 0%,#2d0a5e 50%,#0a0a1a 100%);
      padding:20px;color:#fff;}

    .card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);
      border-radius:24px;padding:40px 36px;width:100%;max-width:400px;
      backdrop-filter:blur(20px);box-shadow:0 32px 80px rgba(0,0,0,0.5);}

    .logo{text-align:center;margin-bottom:28px;}
    .logo .owl{font-size:2.8rem;display:block;margin-bottom:8px;}
    .logo h1{font-size:1.35rem;font-weight:800;letter-spacing:-.02em;}
    .logo p{font-size:.78rem;color:rgba(255,255,255,0.5);margin-top:4px;letter-spacing:.05em;text-transform:uppercase;}

    .badge-admin{display:inline-flex;align-items:center;gap:6px;
      background:rgba(241,196,15,0.12);border:1px solid rgba(241,196,15,0.3);
      color:#f1c40f;font-size:.72rem;font-weight:700;padding:4px 12px;
      border-radius:999px;margin-bottom:24px;letter-spacing:.04em;}

    .field{margin-bottom:16px;}
    .field label{display:block;font-size:.78rem;font-weight:700;color:rgba(255,255,255,0.7);margin-bottom:6px;letter-spacing:.03em;}
    .field input{width:100%;padding:12px 16px;border-radius:12px;
      border:1.5px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.06);color:#fff;font-size:.9rem;
      font-family:inherit;transition:.2s;}
    .field input:focus{outline:none;border-color:#9b59b6;background:rgba(255,255,255,0.1);}
    .field input::placeholder{color:rgba(255,255,255,0.3);}

    .btn-login{width:100%;padding:13px;border-radius:12px;border:none;cursor:pointer;
      background:linear-gradient(90deg,#8e44ad,#f39c12);
      color:#fff;font-size:.92rem;font-weight:800;font-family:inherit;
      letter-spacing:.02em;transition:.2s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;}
    .btn-login:hover{opacity:.92;transform:translateY(-1px);}
    .btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none;}

    .error-box{background:rgba(231,76,60,0.12);border:1px solid rgba(231,76,60,0.3);
      color:#e74c3c;border-radius:10px;padding:10px 14px;font-size:.8rem;
      margin-bottom:14px;display:none;line-height:1.5;}

    .hint{text-align:center;margin-top:20px;font-size:.74rem;color:rgba(255,255,255,0.35);line-height:1.6;}
    .hint a{color:rgba(255,255,255,0.5);text-decoration:none;}
    .hint a:hover{color:#fff;}

    .divider{height:1px;background:rgba(255,255,255,0.08);margin:20px 0;}

    .security-note{font-size:.72rem;color:rgba(255,255,255,0.3);text-align:center;
      display:flex;align-items:center;justify-content:center;gap:5px;margin-top:16px;}
    .security-note::before{content:'🔒';}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="owl">🦉</span>
      <h1>Athena AI</h1>
      <p>Admin Portal</p>
    </div>

    <div style="text-align:center">
      <span class="badge-admin">🛡️ AKSES TERBATAS — ADMIN ONLY</span>
    </div>

    <div class="error-box" id="errBox"></div>

    <div class="field">
      <label>Email Admin</label>
      <input type="email" id="emailInput" placeholder="email@adminanda.com" autocomplete="username">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pwInput" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') doAdminLogin()">
    </div>

    <button class="btn-login" id="loginBtn" onclick="doAdminLogin()">
      <span>🔑</span> Masuk ke Panel Admin
    </button>

    <div class="divider"></div>
    <div class="hint">
      Halaman ini hanya untuk tim internal Athena AI.<br>
      Login user biasa? <a href="/">Kembali ke Beranda</a>
    </div>
    <div class="security-note">Koneksi terenkripsi via Supabase Auth</div>
  </div>

  <script>
    /* ===== CONFIG — sama persis dengan athena-ai.html ===== */
    const SUPABASE_URL = 'https://zncsqjbdbfzbzjahormw.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_SLgSnFeVFwEZtRH1Vb3XRg_zgnkWsSu';

    /* Whitelist email admin — verifikasi oleh kode ini sendiri, tanpa password hardcode */
    const ADMIN_EMAILS = [
      'riskyparama4546@gmail.com',
      'kimlana269@gmail.com',
      'kumenomikuroo@gmail.com'
    ];

    function isAdminEmail(email){
      return ADMIN_EMAILS.map(e => e.toLowerCase()).includes((email || '').toLowerCase().trim());
    }

    let sb;
    try { sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }
    catch(e) { showErr('Koneksi ke Supabase gagal: ' + e.message); }

    function showErr(msg){
      const box = document.getElementById('errBox');
      box.textContent = msg;
      box.style.display = 'block';
    }
    function hideErr(){ document.getElementById('errBox').style.display = 'none'; }

    async function doAdminLogin(){
      hideErr();
      const email = document.getElementById('emailInput').value.trim();
      const pw    = document.getElementById('pwInput').value;
      const btn   = document.getElementById('loginBtn');

      if (!email || !pw) { showErr('Isi email dan password terlebih dahulu.'); return; }

      /* Langkah 1 — cek whitelist dulu sebelum menyentuh Supabase */
      if (!isAdminEmail(email)) {
        showErr('Email ini tidak terdaftar sebagai admin Athena AI.');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span>⏳</span> Memverifikasi...';

      try {
        if (!sb) throw new Error('Supabase tidak tersedia.');

        /* Langkah 2 — autentikasi lewat Supabase (password di-hash oleh Supabase, tidak tersimpan di kode) */
        const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
        if (error) throw error;

        /* Langkah 3 — double-check email dari respons Supabase (anti-spoofing) */
        if (!isAdminEmail(data.user.email)) {
          await sb.auth.signOut();
          throw new Error('Akun ini tidak memiliki hak akses admin.');
        }

        /* Berhasil — redirect ke app utama dengan hash #admin agar SPA langsung buka panel */
        window.location.href = '/?admin=1#admin';

      } catch(err){
        showErr(err.message || 'Login gagal. Periksa email dan password.');
        btn.disabled = false;
        btn.innerHTML = '<span>🔑</span> Masuk ke Panel Admin';
      }
    }

    /* Auto-login jika sudah ada sesi admin aktif */
    (async function(){
      try {
        if (!sb) return;
        const { data } = await sb.auth.getSession();
        if (data && data.session && data.session.user && isAdminEmail(data.session.user.email)){
          window.location.href = '/?admin=1#admin';
        }
      } catch(e){}
    })();
  </script>
</body>
</html>
